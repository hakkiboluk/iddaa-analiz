name: Daily Match Data Fetch

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch match data
        run: node scripts/fetch-matches.js
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "İddaa Bot"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Günlük veri - $(date +'%d/%m/%Y')"
          git push
